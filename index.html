const PRICE_COLORS = {
  'PRICE_LEVEL_INEXPENSIVE': '#34a853',
  'PRICE_LEVEL_MODERATE': '#4285f4',
  'PRICE_LEVEL_EXPENSIVE': '#f4a825',
  'PRICE_LEVEL_VERY_EXPENSIVE': '#ea4335',
  '': '#9e9e9e',
};

let map, markers = [], infoWindow;
let activePrices = new Set(['PRICE_LEVEL_INEXPENSIVE', 'PRICE_LEVEL_MODERATE', 'PRICE_LEVEL_EXPENSIVE', 'PRICE_LEVEL_VERY_EXPENSIVE', 'unknown']);
let michelinOnly = false;
let guideOnly = false;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 45.4642, lng: 9.19 },
    zoom: 13,
    mapTypeControl: false,
    streetViewControl: false,
    styles: [
      { featureType: 'poi.business', stylers: [{ visibility: 'off' }] },
      { featureType: 'poi.attraction', stylers: [{ visibility: 'simplified' }] },
    ],
  });

  infoWindow = new google.maps.InfoWindow();

  restaurants.forEach((r, idx) => {
    const priceKey = r.price_level || '';
    const color = PRICE_COLORS[priceKey] || PRICE_COLORS[''];

    const marker = new google.maps.marker.AdvancedMarkerElement({
      map: map,
      position: { lat: r.latitude, lng: r.longitude },
      title: r.name,
      content: buildMarkerContent(color),
    });

    marker._data = r;
    marker._priceKey = priceKey || 'unknown';

    marker.addListener('click', () => {
      infoWindow.setContent(buildInfoWindow(r));
      infoWindow.open(map, marker);
    });

    markers.push(marker);
  });

  setupFilters();
  updateVisibility();
}

function buildMarkerContent(color) {
  const div = document.createElement('div');
  div.style.cssText = 'width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);background:' + color;
  return div;
}

function buildInfoWindow(r) {
  let html = '<div class="info-window">';
  html += '<h3>' + escHtml(r.name) + '</h3>';
  html += '<div class="meta">';
  if (r.google_rating) html += '<span class="rating">★ ' + r.google_rating + ' (' + (r.user_rating_count || 0) + ')</span>';
  if (r.price_display) html += '<span class="price">' + r.price_display + '</span>';
  if (r.marco_rating) html += '<span class="marco">Marco: ' + r.marco_rating + '</span>';
  if (r.michelin_stars) html += '<span class="michelin">⭐ ' + r.michelin_stars + ' Michelin</span>';
  if (r.cuisine) html += '<span class="cuisine">' + escHtml(r.cuisine) + '</span>';
  html += '</div>';

  const summary = r.editorial_summary || r.review;
  if (summary) html += '<div class="summary">' + escHtml(summary) + '</div>';

  if (r.formatted_address) html += '<div class="address">📍 ' + escHtml(r.formatted_address) + '</div>';

  if (r.hours && r.hours.length) {
    html += '<details style="margin:4px 0"><summary style="font-size:11px;color:#666;cursor:pointer">Hours</summary><ul class="hours-list">';
    r.hours.forEach(h => html += '<li>' + escHtml(h) + '</li>');
    html += '</ul></details>';
  }

  html += '<div class="links">';
  if (r.google_maps_url) html += '<a href="' + r.google_maps_url + '" target="_blank">Google Maps</a>';
  if (r.website) html += '<a href="' + r.website + '" target="_blank">Website</a>';
  html += '</div></div>';
  return html;
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function setupFilters() {
  document.querySelectorAll('#price-filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const price = btn.dataset.price;
      btn.classList.toggle('active');
      if (activePrices.has(price)) activePrices.delete(price);
      else activePrices.add(price);
      updateVisibility();
    });
  });

  document.getElementById('michelin-filter').addEventListener('click', function() {
    michelinOnly = !michelinOnly;
    this.classList.toggle('active', michelinOnly);
    updateVisibility();
  });

  document.getElementById('guide-filter').addEventListener('click', function() {
    guideOnly = !guideOnly;
    this.classList.toggle('active', guideOnly);
    updateVisibility();
  });
}

function updateVisibility() {
  let visible = 0;
  markers.forEach(m => {
    const r = m._data;
    let show = activePrices.has(m._priceKey);
    if (michelinOnly && !r.michelin_stars) show = false;
    if (guideOnly && !r.in_guide) show = false;

    if (show) {
      m.map = map;
      visible++;
    } else {
      m.map = null;
    }
  });
  document.getElementById('stats').textContent = 'Showing ' + visible + ' of ' + markers.length + ' restaurants';
}
</script>
